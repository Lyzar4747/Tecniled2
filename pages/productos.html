<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos | TECNILED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="/js/carrito.js"></script>

</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="logo-container">
        <img src="../img/logo/LOGO.jpg" alt="Logo TECNILED" class="logo-img">
        <span class="logo-text">TECNILED</span>
    </div>

    <nav class="nav">
        <a href="../index.html">Inicio</a>
        <a href="productos.html">Productos</a>
        <a href="carrito.html">Carrito</a>
    </nav>
</header>

<!-- PRODUCTOS -->
<section class="productos-section">
    <h2>Nuestros Productos</h2>

    <div class="grid-productos">

        <!-- PRODUCTO 1 -->
        <div class="producto-card">
            <img src="../img/ofertas/panel12.jpg" alt="Panel LED">
            <h3>Panel LED 18W</h3>
            <p class="precio">$36.000</p>

            <button 
                class="btn-producto"
                data-nombre="Panel LED 18W"
                data-precio="36000">
                Agregar al carrito
            </button>
        </div>

        <!-- PRODUCTO 2 -->
        <div class="producto-card">
            <img src="../img/ofertas/interructor.jpg" alt="Interruptor">
            <h3>Interruptor Doble</h3>
            <p class="precio">$15.300</p>

            <button 
                class="btn-producto"
                data-nombre="Interruptor Doble"
                data-precio="15300">
                Agregar al carrito
            </button>
        </div>

        <!-- PRODUCTO 3 -->
        <div class="producto-card">
            <img src="../img/ofertas/cable.jpg" alt="Cable">
            <h3>Cable THHN 12</h3>
            <p class="precio">$84.000</p>

            <button 
                class="btn-producto"
                data-nombre="Cable THHN 12"
                data-precio="84000">
                Agregar al carrito
            </button>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-grid">
        <div>
            <h3>TECNILED</h3>
            <p>Soluciones eléctricas profesionales.</p>
        </div>
        <div>
            <h4>Contacto</h4>
            <p>300 123 4567</p>
            <p>Medellín, Colombia</p>
        </div>
    </div>

    <div class="footer-bottom">
        <p>© 2026 TECNILED</p>
    </div>
</footer>

<!-- SCRIPT DEL CARRITO -->
<script src="../js/carrito.js"></script>

</body>
</html>
